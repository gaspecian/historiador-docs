# nginx sample — minimal TLS-terminating proxy for a Historiador Doc
# production deploy.
#
# Routes:
#   docs.example.com        → Next.js web UI (apps/web, internal :3000)
#   mcp.example.com         → MCP endpoint   (apps/mcp, container :3002)
#
# What this config does:
#   * Terminates TLS (cert paths assume Let's Encrypt / certbot layout).
#   * Forwards the Authorization header so MCP bearer tokens survive.
#   * Disables buffering on the MCP endpoint so JSON-RPC streaming
#     responses are not delayed.
#   * Strips `X-Forwarded-*` from untrusted inputs and sets them to
#     trusted values derived from the connection.
#
# What this config does NOT do:
#   * Rate limiting — add `limit_req_zone` / `limit_req` to taste.
#   * IP allowlisting — add `allow` / `deny` directives if your MCP
#     tenant is a known IP range.
#   * Authorizing the web UI — the app handles its own JWT auth.
#
# Adjust server_name, ssl_certificate paths, and resolver to your env
# before copying into /etc/nginx/conf.d/historiador.conf.

# The Docker bridge resolver — lets nginx re-resolve service names on
# container restarts. Ignore if you run nginx outside Docker.
# resolver 127.0.0.11 valid=30s;

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name docs.example.com mcp.example.com;
    return 301 https://$host$request_uri;
}

# ---- Web UI (Next.js, authoring) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name docs.example.com;

    ssl_certificate     /etc/letsencrypt/live/docs.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Next.js standalone server on the internal network.
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 60s;
    }
}

# ---- MCP endpoint (JSON-RPC 2.0 over HTTP) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mcp.example.com;

    ssl_certificate     /etc/letsencrypt/live/mcp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Health check can bypass auth; the MCP binary exposes /health as
    # a public endpoint by router structure.
    location = /health {
        proxy_pass http://mcp:3002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # The real MCP endpoint. Keep /mcp and /query both routable — the
    # former is what Claude Desktop and other MCP clients use; the
    # latter is an internal alias retained for the web UI.
    location / {
        proxy_pass http://mcp:3002;
        proxy_http_version 1.1;

        # Preserve the bearer token exactly as received.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Connection        "";

        # JSON-RPC tools/call should respond in under 2s per the v1.0
        # performance target — fail fast instead of hanging forever.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # No request buffering — JSON-RPC requests are tiny and the
        # client is already batching.
        proxy_request_buffering off;
    }
}
