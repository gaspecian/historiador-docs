# Historiador Doc — local dev infrastructure.
#
# Philosophy: docker-compose runs only the stateful/prebuilt services
# (Postgres, Ollama, and optionally VexFS). The Rust binaries (api, mcp)
# and the Next.js frontend (web) are meant to run on the host via
# `cargo run` and `pnpm dev` so iteration is fast and failures show up
# in a normal terminal instead of buried in container logs.
#
# For a production-style fully containerized run, use the `full` profile
# (TODO: reintroduce api/mcp/web services under that profile when we
# need it — see Dockerfile.rust, which is still present).
#
# Services started by `docker compose up -d` (default):
#   * postgres (5432) — SQL store for workspaces, users, pages, chunks
#   * ollama   (11434) — local Llama inference (llama3.2:1b pre-pulled)
#
# Services started by `docker compose --profile vector up -d`:
#   * vexfs    (7680) — vector store; only needed once the chunker lands.
#     Requires running `scripts/setup-vexfs.sh` once to vendor the code.
#
# Security invariants (ADR-003, enforced on the DB side by
# docker/postgres/init/10-roles.sh):
#   * role historiador_api has read/write on app tables
#   * role historiador_mcp has SELECT only on a whitelisted subset
#   The API binary uses DATABASE_URL_READWRITE; the MCP binary uses
#   DATABASE_URL_READONLY. The two names are distinct so accidental
#   reuse is syntactically impossible.

name: historiador-doc

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: historiador_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-devpassword}
      POSTGRES_DB: historiador
      # Consumed by docker/postgres/init/10-roles.sh on first boot.
      POSTGRES_API_PASSWORD: ${POSTGRES_API_PASSWORD:-apipass}
      POSTGRES_MCP_PASSWORD: ${POSTGRES_MCP_PASSWORD:-mcppass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${HOST_PORT_POSTGRES:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historiador_admin -d historiador"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Serve, then pull the model in the background on first boot.
    # `|| true` keeps the container alive even if the pull fails (no
    # network, model renamed upstream) — the user can retry with
    # `docker compose exec ollama ollama pull llama3.2:1b` later.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 3
        /bin/ollama pull ${OLLAMA_MODEL:-llama3.2:1b} || true
        wait
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:${HOST_PORT_OLLAMA:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  vexfs:
    # Opt-in: `docker compose --profile vector up -d`.
    # VexFS has no published image. Run `scripts/setup-vexfs.sh` once to
    # clone the pinned commit into vendor/vexfs/ (the script sidesteps a
    # broken submodule reference in the upstream repo by passing
    # --no-recurse-submodules to git clone). Compose builds from the
    # local clone, NOT from a git URL, because buildkit's git fetcher
    # always initializes submodules and fails on the broken reference.
    profiles: ["vector"]
    build:
      context: ./vendor/vexfs
    restart: unless-stopped
    environment:
      RUST_LOG: info
      VEXFS_PORT: "7680"
      VEXFS_DATA_DIR: /app/data
    volumes:
      - vexfs_data:/app/data
    ports:
      - "127.0.0.1:${HOST_PORT_VEXFS:-7680}:7680"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7680/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  ollama_data:
  vexfs_data:
