# Historiador Doc — local dev infrastructure.
#
# Philosophy: docker-compose runs only the stateful/prebuilt services
# (Postgres, Ollama, Chronik-Stream). The Rust binaries (api, mcp) and
# the Next.js frontend (web) are meant to run on the host via
# `cargo run` and `pnpm dev` so iteration is fast and failures show up
# in a normal terminal instead of buried in container logs.
#
# For a production-style fully containerized run, use the `full` profile
# (TODO: reintroduce api/mcp/web services under that profile when we
# need it — see Dockerfile.rust, which is still present).
#
# Services started by `docker compose up -d` (default):
#   * postgres (5432)  — SQL store for workspaces, users, pages, chunks
#   * ollama   (11434) — local inference (llama3.1:8b + nomic-embed-text pre-pulled)
#   * chronik  (9092 Kafka, 6092 SQL REST) — event streaming, vector
#     search, full-text search, and SQL analytics (ADR-007)
#
# Security invariants (ADR-003, enforced on the DB side by
# docker/postgres/init/10-roles.sh):
#   * role historiador_api has read/write on app tables
#   * role historiador_mcp has SELECT only on a whitelisted subset
#   The API binary uses DATABASE_URL_READWRITE; the MCP binary uses
#   DATABASE_URL_READONLY. The two names are distinct so accidental
#   reuse is syntactically impossible.

name: historiador-doc

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: historiador_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-devpassword}
      POSTGRES_DB: historiador
      # Consumed by docker/postgres/init/10-roles.sh on first boot.
      POSTGRES_API_PASSWORD: ${POSTGRES_API_PASSWORD:-apipass}
      POSTGRES_MCP_PASSWORD: ${POSTGRES_MCP_PASSWORD:-mcppass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${HOST_PORT_POSTGRES:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historiador_admin -d historiador"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        SERVE_PID=$$!
        until /bin/ollama list >/dev/null 2>&1; do
          sleep 1
        done
        echo "[ollama] server ready, pulling models"
        /bin/ollama pull "${OLLAMA_GEN_MODEL:-llama3.1:8b}"
        /bin/ollama pull "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
        echo "[ollama] models ready"
        wait $$SERVE_PID
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:${HOST_PORT_OLLAMA:-11434}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  chronik:
    image: ghcr.io/lspecian/chronik-stream:${CHRONIK_VERSION:-2.4.1}
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - seccomp:unconfined
    command: ["start", "--bind", "0.0.0.0", "--data-dir", "/var/lib/chronik"]
    environment:
      RUST_LOG: info
      CHRONIK_DATA_DIR: /var/lib/chronik
      # Topic configurations with per-topic capability flags.
      CHRONIK_TOPICS: >-
        published-pages:vector,fulltext;
        mcp-queries:sql;
        editor-conversations:stream;
        page-events:stream,sql
    volumes:
      - chronik_data:/var/lib/chronik
    ports:
      - "127.0.0.1:${HOST_PORT_CHRONIK_KAFKA:-9092}:9092"
      - "127.0.0.1:${HOST_PORT_CHRONIK_SQL:-6092}:6092"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6092/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  ollama_data:
  chronik_data:
