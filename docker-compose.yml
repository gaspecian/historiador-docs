# Historiador Doc — local dev infrastructure.
#
# Philosophy: docker-compose runs only the stateful/prebuilt services
# (Postgres, Ollama, Chronik-Stream). The Rust binaries (api, mcp) and
# the Next.js frontend (web) are meant to run on the host via
# `cargo run` and `pnpm dev` so iteration is fast and failures show up
# in a normal terminal instead of buried in container logs.
#
# For a production-style fully containerized run, use the `full` profile
# (TODO: reintroduce api/mcp/web services under that profile when we
# need it — see Dockerfile.rust, which is still present).
#
# Services started by `docker compose up -d` (default):
#   * postgres (5432)  — SQL store for workspaces, users, pages, chunks
#   * ollama   (11434) — local Llama inference (llama3.2:1b pre-pulled)
#   * chronik  (9092 Kafka, 6092 SQL REST) — event streaming, vector
#     search, full-text search, and SQL analytics (ADR-007)
#
# Security invariants (ADR-003, enforced on the DB side by
# docker/postgres/init/10-roles.sh):
#   * role historiador_api has read/write on app tables
#   * role historiador_mcp has SELECT only on a whitelisted subset
#   The API binary uses DATABASE_URL_READWRITE; the MCP binary uses
#   DATABASE_URL_READONLY. The two names are distinct so accidental
#   reuse is syntactically impossible.

name: historiador-doc

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: historiador_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-devpassword}
      POSTGRES_DB: historiador
      # Consumed by docker/postgres/init/10-roles.sh on first boot.
      POSTGRES_API_PASSWORD: ${POSTGRES_API_PASSWORD:-apipass}
      POSTGRES_MCP_PASSWORD: ${POSTGRES_MCP_PASSWORD:-mcppass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${HOST_PORT_POSTGRES:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historiador_admin -d historiador"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Serve, then pull the model in the background on first boot.
    # `|| true` keeps the container alive even if the pull fails (no
    # network, model renamed upstream) — the user can retry with
    # `docker compose exec ollama ollama pull llama3.2:1b` later.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 3
        /bin/ollama pull ${OLLAMA_MODEL:-llama3.1:8b} || true
        wait
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:${HOST_PORT_OLLAMA:-11434}:11434"
    # GPU acceleration via the NVIDIA Container Toolkit. Requires the
    # host to have the NVIDIA driver and `nvidia-container-toolkit`
    # installed; on WSL2, ensure the driver is exposed via the Windows
    # host's NVIDIA driver and `nvidia-smi` works inside the distro.
    # To run CPU-only, set OLLAMA_GPU_COUNT=0 (the reservation becomes
    # a no-op when count is 0) or comment out the `deploy` block below.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  chronik:
    # Chronik-Stream — unified event streaming, vector search, full-text
    # search, and SQL analytics (ADR-007). Replaces VexFS (ADR-001).
    # Ports: 9092 (Kafka-compatible), 6092 (DataFusion SQL REST API).
    #
    # CLI note: the :latest image (v2.4.1) renamed the CLI from
    #   chronik-server --bind-addr 0.0.0.0 standalone
    # to
    #   chronik-server start --bind 0.0.0.0
    # We override `command:` so the compose file does not rely on the
    # image's default CMD, which still carries the old flags.
    #
    # Known issue (2026-04-14): v2.4.1 runs as uid 1001 but the named
    # volume's root directory is owned by uid 0, so stage-1 startup
    # fails with "Permission denied" while creating /var/lib/chronik
    # subdirectories. Pin CHRONIK_VERSION to a working tag, or use a
    # host bind-mount with `chown 1001:1001`, until upstream ships an
    # image that either runs as root + drops privileges after chown
    # or declares a properly-owned VOLUME.
    image: ghcr.io/lspecian/chronik-stream:${CHRONIK_VERSION:-2.4.1}
    restart: unless-stopped
    # Two local-dev workarounds (both harmless for dev, NOT for prod):
    #
    # 1. `user: "0:0"` — v2.2+ does not fix up the named volume's
    #    ownership on first boot, so its uid-1001 chronik user cannot
    #    create /var/lib/chronik/segments. Running as root sidesteps
    #    this until upstream ships an init entrypoint or a pre-chowned
    #    VOLUME directive.
    #
    # 2. `security_opt: seccomp:unconfined` — Chronik's WAL path uses
    #    `io_uring` for 10x faster group commits. Docker's default
    #    seccomp profile blocks io_uring syscalls (controversial since
    #    CVE-2022-0185 and friends). Unconfined opens the full syscall
    #    table; acceptable for dev, but production should rely on a
    #    kernel that ships a permissive io_uring seccomp policy, or
    #    set CHRONIK_WAL_PROFILE to disable io_uring.
    user: "0:0"
    security_opt:
      - seccomp:unconfined
    command: ["start", "--bind", "0.0.0.0", "--data-dir", "/var/lib/chronik"]
    environment:
      RUST_LOG: info
      CHRONIK_DATA_DIR: /var/lib/chronik
      # Topic configurations with per-topic capability flags.
      CHRONIK_TOPICS: >-
        published-pages:vector,fulltext;
        mcp-queries:sql;
        editor-conversations:stream;
        page-events:stream,sql
    volumes:
      - chronik_data:/var/lib/chronik
    ports:
      - "127.0.0.1:${HOST_PORT_CHRONIK_KAFKA:-9092}:9092"
      - "127.0.0.1:${HOST_PORT_CHRONIK_SQL:-6092}:6092"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6092/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  ollama_data:
  chronik_data:
