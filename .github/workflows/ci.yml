name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: historiador-ci

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo build (release)
        run: cargo build --workspace --release

  node:
    name: Node (pnpm install, lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Check OpenAPI types freshness
        run: |
          pnpm build:types
          git diff --exit-code packages/types/generated/index.ts

      - name: pnpm lint
        run: pnpm lint

  docker-build:
    name: Docker images (smoke build, no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust
          build-args: BIN_NAME=api
          push: false
          tags: historiador-doc/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust
          build-args: BIN_NAME=mcp
          push: false
          tags: historiador-doc/mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: historiador-doc/web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Note: the `vexfs` image is intentionally NOT built in CI. It requires
      # scripts/setup-vexfs.sh to clone upstream (github.com/lspecian/vexfs)
      # and apply a local patch to the broken Dockerfile entrypoint reference
      # — too much surface for a smoke-build job. Sprint 2 should revisit
      # once the upstream Dockerfile is fixed.
