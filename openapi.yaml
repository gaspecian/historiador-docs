openapi: 3.1.0
info:
  title: Historiador Doc API
  description: REST API for Historiador Doc — self-hosted documentation with a built-in MCP server.
  license:
    name: AGPL-3.0-or-later
    identifier: AGPL-3.0-or-later
  version: 0.1.0
paths:
  /admin/analytics/mcp-queries:
    get:
      tags:
      - admin
      operationId: get_mcp_analytics
      parameters:
      - name: days
        in: query
        description: Number of days to look back (default 7, max 30).
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
      responses:
        '200':
          description: MCP query analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpAnalyticsResponse'
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '503':
          description: Chronik not configured
      security:
      - bearer: []
  /admin/users:
    get:
      tags:
      - admin
      operationId: list_users
      responses:
        '200':
          description: user list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
      security:
      - bearer: []
  /admin/users/invite:
    post:
      tags:
      - admin
      operationId: invite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRequest'
        required: true
      responses:
        '200':
          description: invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteResponse'
        '400':
          description: validation error
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
        '409':
          description: email already in use
      security:
      - bearer: []
  /admin/users/{id}/deactivate:
    patch:
      tags:
      - admin
      operationId: deactivate_user
      parameters:
      - name: id
        in: path
        description: User ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: user deactivated
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
        '404':
          description: user not found
      security:
      - bearer: []
  /admin/workspace:
    get:
      tags:
      - admin
      operationId: get_workspace
      responses:
        '200':
          description: workspace config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
        '404':
          description: workspace not found
      security:
      - bearer: []
  /admin/workspace/llm:
    patch:
      tags:
      - admin
      operationId: update_llm_config
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmPatchRequest'
        required: true
      responses:
        '200':
          description: llm config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmPatchResponse'
        '400':
          description: validation / probe failed
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
      security:
      - bearer: []
  /admin/workspace/regenerate-token:
    post:
      tags:
      - admin
      operationId: regenerate_token
      responses:
        '200':
          description: new token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegenerateTokenResponse'
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
      security:
      - bearer: []
  /admin/workspace/reindex:
    post:
      tags:
      - admin
      operationId: reindex
      responses:
        '202':
          description: re-indexing spawned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReindexResponse'
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
      security:
      - bearer: []
  /auth/activate:
    post:
      tags:
      - auth
      operationId: activate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateRequest'
        required: true
      responses:
        '204':
          description: activated
        '400':
          description: validation error
        '401':
          description: invite token invalid or expired
  /auth/login:
    post:
      tags:
      - auth
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: validation error
        '401':
          description: invalid credentials
  /auth/logout:
    post:
      tags:
      - auth
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      responses:
        '204':
          description: logged out
  /auth/refresh:
    post:
      tags:
      - auth
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: invalid or expired refresh token
  /collections:
    get:
      tags:
      - collections
      operationId: list_collections
      responses:
        '200':
          description: list of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollectionResponse'
        '401':
          description: unauthorized
      security:
      - bearer: []
    post:
      tags:
      - collections
      operationId: create_collection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
        required: true
      responses:
        '201':
          description: collection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '400':
          description: validation error
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '409':
          description: slug conflict
      security:
      - bearer: []
  /collections/{id}:
    delete:
      tags:
      - collections
      operationId: delete_collection
      parameters:
      - name: id
        in: path
        description: Collection ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: collection deleted
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '404':
          description: not found
      security:
      - bearer: []
    patch:
      tags:
      - collections
      operationId: update_collection
      parameters:
      - name: id
        in: path
        description: Collection ID
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionRequest'
        required: true
      responses:
        '200':
          description: collection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '400':
          description: validation error
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '404':
          description: not found
        '409':
          description: slug conflict
      security:
      - bearer: []
  /editor/draft:
    post:
      tags:
      - editor
      operationId: draft
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftRequest'
        required: true
      responses:
        '200':
          description: 'SSE stream of generated markdown; event types: `delta` (data: {"text": "..."}), `error` (data: {"message": "..."}), `done` (data: {"length": N}). Content-Type: text/event-stream.'
          content:
            text/event-stream: {}
        '400':
          description: validation error
        '401':
          description: unauthorized
        '403':
          description: forbidden
      security:
      - bearer: []
  /editor/iterate:
    post:
      tags:
      - editor
      operationId: iterate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IterateRequest'
        required: true
      responses:
        '200':
          description: SSE stream of refined markdown; see /editor/draft for event shape.
          content:
            text/event-stream: {}
        '400':
          description: validation error
        '401':
          description: unauthorized
        '403':
          description: forbidden
      security:
      - bearer: []
  /export:
    get:
      tags:
      - export
      operationId: export_workspace
      responses:
        '200':
          description: zip of all published pages
          content:
            application/zip: {}
        '401':
          description: unauthenticated
        '403':
          description: caller is not admin
      security:
      - bearer: []
  /health:
    get:
      tags:
      - system
      operationId: handler
      responses:
        '200':
          description: service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /pages:
    get:
      tags:
      - pages
      operationId: list_pages
      parameters:
      - name: collection_id
        in: query
        required: false
        schema:
          type:
          - string
          - 'null'
          format: uuid
      responses:
        '200':
          description: pages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageResponse'
        '401':
          description: unauthorized
      security:
      - bearer: []
    post:
      tags:
      - pages
      operationId: create_page
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePageRequest'
        required: true
      responses:
        '201':
          description: page created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: validation error
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '409':
          description: slug conflict
      security:
      - bearer: []
  /pages/search:
    get:
      tags:
      - pages
      operationId: search_pages
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageResponse'
        '401':
          description: unauthorized
      security:
      - bearer: []
  /pages/{id}:
    get:
      tags:
      - pages
      operationId: get_page
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: page with all versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '401':
          description: unauthorized
        '404':
          description: not found
      security:
      - bearer: []
    patch:
      tags:
      - pages
      operationId: update_page
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePageRequest'
        required: true
      responses:
        '200':
          description: page updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: validation error or page is published
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '404':
          description: not found
      security:
      - bearer: []
  /pages/{id}/draft:
    post:
      tags:
      - pages
      operationId: draft_page
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: reverted to draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '404':
          description: not found
      security:
      - bearer: []
  /pages/{id}/export:
    get:
      tags:
      - export
      operationId: export_page
      parameters:
      - name: id
        in: path
        description: Page id
        required: true
        schema:
          type: string
          format: uuid
      - name: language
        in: query
        description: BCP 47 language tag; defaults to workspace primary
        required: false
        schema:
          type: string
      responses:
        '200':
          description: markdown with YAML front-matter
          content:
            text/markdown: {}
        '401':
          description: unauthenticated
        '404':
          description: page or version not found
      security:
      - bearer: []
  /pages/{id}/history:
    get:
      tags:
      - pages
      operationId: list_version_history
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      - name: language
        in: query
        description: BCP 47 language tag (required).
        required: true
        schema:
          type: string
      - name: page
        in: query
        description: Page number (1-indexed, default 1).
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      - name: per_page
        in: query
        description: Items per page (default 20, max 50).
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
      responses:
        '200':
          description: paginated version history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionHistoryListResponse'
        '401':
          description: unauthorized
        '404':
          description: not found
      security:
      - bearer: []
  /pages/{id}/history/{history_id}:
    get:
      tags:
      - pages
      operationId: get_version_history_item
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      - name: history_id
        in: path
        description: Version history entry ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: full version content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionHistoryDetailResponse'
        '401':
          description: unauthorized
        '404':
          description: not found
      security:
      - bearer: []
  /pages/{id}/history/{history_id}/restore:
    post:
      tags:
      - pages
      operationId: restore_version
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      - name: history_id
        in: path
        description: Version history entry ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: restored as draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: page is published
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '404':
          description: not found
      security:
      - bearer: []
  /pages/{id}/publish:
    post:
      tags:
      - pages
      operationId: publish_page
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: publish accepted, chunking in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
        '401':
          description: unauthorized
        '403':
          description: forbidden
        '404':
          description: not found
      security:
      - bearer: []
  /pages/{id}/versions:
    get:
      tags:
      - pages
      operationId: get_page_versions
      parameters:
      - name: id
        in: path
        description: Page ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: page versions with completeness metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageVersionsResponse'
        '401':
          description: unauthorized
        '404':
          description: not found
      security:
      - bearer: []
  /setup/init:
    post:
      tags:
      - setup
      operationId: init
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
        required: true
      responses:
        '200':
          description: installation initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupResponse'
        '400':
          description: validation error or LLM key rejected
        '409':
          description: setup already complete
  /setup/ollama-models:
    post:
      tags:
      - setup
      operationId: ollama_models
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OllamaModelsRequest'
        required: true
      responses:
        '200':
          description: available models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OllamaModelsResponse'
        '400':
          description: invalid URL or Ollama unreachable
  /setup/probe:
    post:
      tags:
      - setup
      operationId: probe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeRequest'
        required: true
      responses:
        '200':
          description: probe result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
components:
  schemas:
    ActivateRequest:
      type: object
      required:
      - invite_token
      - password
      properties:
        invite_token:
          type: string
        password:
          type: string
    Collection:
      type: object
      required:
      - id
      - workspace_id
      - name
      - slug
      - sort_order
      - created_at
      - updated_at
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type:
          - string
          - 'null'
          format: uuid
        slug:
          type: string
        sort_order:
          type: integer
          format: int32
        updated_at:
          type: string
          format: date-time
        workspace_id:
          type: string
          format: uuid
    CollectionResponse:
      type: object
      required:
      - id
      - workspace_id
      - name
      - slug
      - sort_order
      - created_at
      - updated_at
      properties:
        created_at:
          type: string
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type:
          - string
          - 'null'
          format: uuid
        slug:
          type: string
        sort_order:
          type: integer
          format: int32
        updated_at:
          type: string
        workspace_id:
          type: string
          format: uuid
    CreateCollectionRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        parent_id:
          type:
          - string
          - 'null'
          format: uuid
    CreatePageRequest:
      type: object
      required:
      - title
      - content_markdown
      - language
      properties:
        collection_id:
          type:
          - string
          - 'null'
          format: uuid
        content_markdown:
          type: string
        language:
          type: string
          description: BCP 47 language tag (e.g., "en-US", "pt-BR").
        title:
          type: string
    DayCountDto:
      type: object
      required:
      - date
      - count
      properties:
        count:
          type: integer
          format: int64
        date:
          type: string
    DraftRequest:
      type: object
      required:
      - brief
      properties:
        brief:
          type: string
          description: Natural language description of the document to create.
        language:
          type:
          - string
          - 'null'
          description: Optional BCP 47 language tag for the output language.
    HealthResponse:
      type: object
      description: |-
        Response body for `GET /health`. Exposed as an OpenAPI schema so
        stretch item 7 (openapi-typescript) can generate a matching
        TypeScript type for the frontend.
      required:
      - status
      - version
      - git_sha
      properties:
        git_sha:
          type: string
        status:
          type: string
        version:
          type: string
    InviteRequest:
      type: object
      required:
      - email
      - role
      properties:
        email:
          type: string
        role:
          $ref: '#/components/schemas/Role'
    InviteResponse:
      type: object
      required:
      - user_id
      - activation_url
      - expires_at
      properties:
        activation_url:
          type: string
        expires_at:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
    IterateRequest:
      type: object
      required:
      - current_draft
      - instruction
      properties:
        current_draft:
          type: string
          description: The current draft markdown to refine.
        instruction:
          type: string
          description: Follow-up instruction describing what to change.
    LlmPatchRequest:
      type: object
      required:
      - llm_provider
      - generation_model
      - embedding_model
      properties:
        embedding_model:
          type: string
        generation_model:
          type: string
        llm_api_key:
          type: string
          description: |-
            API key for cloud providers or base URL for Ollama. Leave
            empty to keep the existing secret (useful when editing only
            the model names).
        llm_provider:
          $ref: '#/components/schemas/LlmProvider'
    LlmPatchResponse:
      type: object
      required:
      - success
      - requires_reindex
      - affected_page_versions
      - requires_restart
      properties:
        affected_page_versions:
          type: integer
          format: int64
        requires_reindex:
          type: boolean
          description: |-
            When the embedding model changed and published chunks exist,
            the admin must trigger a re-index — this field tells the UI
            how many page versions are affected so it can show a confirm.
        requires_restart:
          type: boolean
          description: |-
            True when the generation model changed. The live AppState
            clients keep the previous config until the API process is
            restarted; the UI surfaces this so the admin can plan a
            restart.
        success:
          type: boolean
    LlmProvider:
      type: string
      enum:
      - openai
      - anthropic
      - ollama
      - test
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
        password:
          type: string
    LogoutRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    McpAnalyticsResponse:
      type: object
      description: |-
        Response DTO for the analytics endpoint. Mirrors the Chronik
        `McpQueryStats` but with `utoipa::ToSchema` for OpenAPI generation.
      required:
      - period_days
      - total_queries
      - queries_by_day
      - top_queries
      - zero_result_queries
      properties:
        period_days:
          type: integer
          format: int32
        queries_by_day:
          type: array
          items:
            $ref: '#/components/schemas/DayCountDto'
        top_queries:
          type: array
          items:
            $ref: '#/components/schemas/QueryFrequencyDto'
        total_queries:
          type: integer
          format: int64
        zero_result_queries:
          $ref: '#/components/schemas/ZeroResultSummaryDto'
    OllamaModelEntry:
      type: object
      required:
      - name
      - size_bytes
      properties:
        name:
          type: string
        size_bytes:
          type: integer
          format: int64
          minimum: 0
    OllamaModelsRequest:
      type: object
      required:
      - base_url
      properties:
        base_url:
          type: string
          description: Base URL of a reachable Ollama server (e.g. `http://localhost:11434`).
    OllamaModelsResponse:
      type: object
      required:
      - models
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/OllamaModelEntry'
    PageResponse:
      type: object
      required:
      - id
      - workspace_id
      - slug
      - status
      - versions
      - created_at
      - updated_at
      properties:
        collection_id:
          type:
          - string
          - 'null'
          format: uuid
        created_at:
          type: string
        created_by:
          type:
          - string
          - 'null'
          format: uuid
        id:
          type: string
          format: uuid
        slug:
          type: string
        status:
          $ref: '#/components/schemas/PageStatus'
        updated_at:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/PageVersionResponse'
        workspace_id:
          type: string
          format: uuid
    PageStatus:
      type: string
      enum:
      - draft
      - published
    PageVersionResponse:
      type: object
      required:
      - id
      - language
      - title
      - content_markdown
      - status
      - created_at
      - updated_at
      properties:
        author_id:
          type:
          - string
          - 'null'
          format: uuid
        content_markdown:
          type: string
        created_at:
          type: string
        id:
          type: string
          format: uuid
        language:
          type: string
        status:
          $ref: '#/components/schemas/PageStatus'
        title:
          type: string
        updated_at:
          type: string
    PageVersionsResponse:
      type: object
      required:
      - page_id
      - workspace_languages
      - primary_language
      - versions
      - missing_languages
      - complete
      properties:
        complete:
          type: boolean
        missing_languages:
          type: array
          items:
            type: string
        page_id:
          type: string
          format: uuid
        primary_language:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/PageVersionResponse'
        workspace_languages:
          type: array
          items:
            type: string
    ProbeRequest:
      type: object
      required:
      - llm_provider
      properties:
        llm_api_key:
          type: string
        llm_provider:
          $ref: '#/components/schemas/LlmProvider'
    ProbeResponse:
      type: object
      required:
      - success
      - message
      properties:
        message:
          type: string
        success:
          type: boolean
    PublishResponse:
      type: object
      required:
      - page_id
      - status
      - message
      properties:
        message:
          type: string
        page_id:
          type: string
          format: uuid
        status:
          type: string
    QueryFrequencyDto:
      type: object
      required:
      - query_text
      - count
      properties:
        count:
          type: integer
          format: int64
        query_text:
          type: string
    RefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    RegenerateTokenResponse:
      type: object
      required:
      - bearer_token
      properties:
        bearer_token:
          type: string
          description: |-
            The new bearer token in plaintext. This is the only time it
            will be visible — the server stores only the sha256 hash.
    ReindexResponse:
      type: object
      required:
      - scheduled
      properties:
        scheduled:
          type: integer
          format: int64
          description: How many published page versions were scheduled for re-embedding.
    Role:
      type: string
      enum:
      - admin
      - author
      - viewer
    SetupRequest:
      type: object
      required:
      - admin_email
      - admin_password
      - workspace_name
      - llm_provider
      - llm_api_key
      - languages
      - primary_language
      properties:
        admin_email:
          type: string
        admin_password:
          type: string
        embedding_model:
          type:
          - string
          - 'null'
          description: Model used for chunk embeddings during publish.
        generation_model:
          type:
          - string
          - 'null'
          description: |-
            Model used for AI text generation (chat / editor). Optional for
            cloud providers (falls back to sensible defaults); required for
            Ollama because models are user-managed local pulls.
        languages:
          type: array
          items:
            type: string
        llm_api_key:
          type: string
        llm_provider:
          $ref: '#/components/schemas/LlmProvider'
        primary_language:
          type: string
        workspace_name:
          type: string
    SetupResponse:
      type: object
      required:
      - workspace_id
      - user_id
      - setup_complete
      properties:
        setup_complete:
          type: boolean
        user_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
    TokenResponse:
      type: object
      required:
      - access_token
      - refresh_token
      - expires_in
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          format: int64
        refresh_token:
          type: string
    UpdateCollectionRequest:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
        parent_id:
          type:
          - string
          - 'null'
          format: uuid
          description: |-
            Set to `null` to move to root, or a UUID to move under a parent.
            Omit the field entirely to leave unchanged.
    UpdatePageRequest:
      type: object
      properties:
        content_markdown:
          type:
          - string
          - 'null'
        language:
          type:
          - string
          - 'null'
          description: BCP 47 language tag. Defaults to the version's current language.
        title:
          type:
          - string
          - 'null'
    UserResponse:
      type: object
      required:
      - id
      - email
      - role
      - active
      - pending
      properties:
        active:
          type: boolean
        email:
          type: string
        id:
          type: string
          format: uuid
        pending:
          type: boolean
          description: '`true` if the user has not yet activated their account.'
        role:
          $ref: '#/components/schemas/Role'
    VersionHistoryDetailResponse:
      type: object
      required:
      - id
      - page_id
      - language
      - version_number
      - title
      - content_markdown
      - is_published
      - created_at
      properties:
        author_id:
          type:
          - string
          - 'null'
          format: uuid
        content_markdown:
          type: string
        created_at:
          type: string
        id:
          type: string
          format: uuid
        is_published:
          type: boolean
        language:
          type: string
        page_id:
          type: string
          format: uuid
        title:
          type: string
        version_number:
          type: integer
          format: int32
    VersionHistoryListResponse:
      type: object
      required:
      - page_id
      - language
      - versions
      - total
      - page
      - per_page
      properties:
        language:
          type: string
        page:
          type: integer
          format: int64
        page_id:
          type: string
          format: uuid
        per_page:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        versions:
          type: array
          items:
            $ref: '#/components/schemas/VersionHistorySummary'
    VersionHistorySummary:
      type: object
      required:
      - id
      - version_number
      - title
      - content_preview
      - is_published
      - created_at
      properties:
        author_id:
          type:
          - string
          - 'null'
          format: uuid
        content_preview:
          type: string
        created_at:
          type: string
        id:
          type: string
          format: uuid
        is_published:
          type: boolean
        title:
          type: string
        version_number:
          type: integer
          format: int32
    WorkspaceResponse:
      type: object
      required:
      - id
      - name
      - languages
      - primary_language
      - llm_provider
      - generation_model
      - embedding_model
      - mcp_endpoint_url
      - has_mcp_token
      properties:
        embedding_model:
          type: string
        generation_model:
          type: string
        has_mcp_token:
          type: boolean
          description: Whether a bearer token has been configured.
        id:
          type: string
          format: uuid
        languages:
          type: array
          items:
            type: string
        llm_base_url:
          type:
          - string
          - 'null'
        llm_provider:
          type: string
        mcp_endpoint_url:
          type: string
          description: The MCP endpoint URL (constructed from config).
        name:
          type: string
        primary_language:
          type: string
    ZeroResultQueryDto:
      type: object
      required:
      - query_text
      - count
      - last_seen
      properties:
        count:
          type: integer
          format: int64
        last_seen:
          type: string
        query_text:
          type: string
    ZeroResultSummaryDto:
      type: object
      required:
      - count
      - queries
      properties:
        count:
          type: integer
          format: int64
        queries:
          type: array
          items:
            $ref: '#/components/schemas/ZeroResultQueryDto'
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
